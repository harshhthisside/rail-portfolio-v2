<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RailCanvas Admin</title>

<link rel="stylesheet" href="css/dashboard.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <script type="module" src="js/auth.js"></script>

<div class="admin-container">

    <aside class="sidebar">

    <h2>🚆 RailCanvas</h2>

    <ul>

        <li class="active" onclick="location.href='dashboard.html'">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </li>

        <li onclick="location.href='editor.html'">
            <i class="fa-solid fa-pen"></i>
            New Blog
        </li>

        <li onclick="location.href='blogs.html'">
            <i class="fa-solid fa-book"></i>
            Manage Blogs
        </li>

        <li id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </li>

    </ul>

</aside>

    <main class="content">

<h1>Dashboard Overview</h1>

<div class="cards">

<div class="card">

<h2 id="blogCount">0</h2>

<p>Total Blogs</p>

</div>

<div class="card">

<h2 id="ratingCount">0</h2>

<p>Total Ratings</p>

</div>

<div class="card">

<h2 id="userCount">0</h2>

<p>Registered Users</p>

</div>

</div>

</main>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/dashboard.js"></script>

</body>

</html>
